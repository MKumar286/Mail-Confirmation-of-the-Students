<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheet CSV Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        /* The magic for auto-adjusting columns */
        table {
            border-collapse: collapse;
            width: max-content; /* Shrinks/grows to exactly fit the content */
            max-width: 100%;    /* Prevents overflowing the screen if too wide */
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px 12px;
            /* Prevents text from wrapping, forcing the column to expand to full text width */
            white-space: nowrap; 
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .container {
            overflow-x: auto; /* Adds a scrollbar if the table is wider than the screen */
        }
    </style>
</head>
<body>

    <h2>Live Google Sheet Data (Auto-fit Columns)</h2>
    <div class="container">
        <table id="sheet-table">
            </table>
    </div>

    <script>
        // 1. REPLACE THIS URL WITH YOUR OWN GOOGLE SHEET CSV EXPORT LINK
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVGHSnygzd6lIkieye30zp-iVX_unEpKnZ_I3m__BhX0NfHicM_WvEJmo25mONaw/pub?gid=1824938792&single=true&output=csv';

        // Simple CSV parser that handles basic commas and rows
        function parseCSV(text) {
            const lines = text.split("\n");
            return lines.map(line => {
                // Basic split by comma (Note: complex sheets with commas inside quotes might need a library like PapaParse)
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
            });
        }

        async function fetchAndRenderSheet() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                const table = document.getElementById('sheet-table');
                table.innerHTML = ""; // Clear table

                data.forEach((row, rowIndex) => {
                    // Skip completely empty rows
                    if (row.length === 1 && row[0].trim() === "") return;

                    const tr = document.createElement('tr');
                    
                    row.forEach(cell => {
                        const cellElement = rowIndex === 0 ? document.createElement('th') : document.createElement('td');
                        // Clean up surrounding quotes from CSV format if they exist
                        cellElement.textContent = cell.replace(/^"|"$/g, '').trim();
                        tr.appendChild(cellElement);
                    });
                    
                    table.appendChild(tr);
                });
            } catch (error) {
                console.error("Error fetching sheet data:", error);
                document.getElementById('sheet-table').innerHTML = "<tr><td>Error loading data. Make sure the sheet is published to the web.</td></tr>";
            }
        }

        // Load the data on page load
        fetchAndRenderSheet();
    </script>

</body>
</html>
