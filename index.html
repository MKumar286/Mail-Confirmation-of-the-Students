<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGIT - Placement Cell Mail Confirmation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Reset and Frame Constraints */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            overflow-x: auto;
            overflow-y: auto; /* Restored vertical screen movement */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            /* Ultra High-Fidelity Deep Cosmic Neon Mesh Gradient */
            background: radial-gradient(circle at 10% 20%, #03000a 0%, #081122 35%, #240533 70%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            padding: 20px 20px 40px 20px; 
            position: relative;
        }

        /* Screen-Pinned Custom Horizontal Scrollbar Styling */
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            height: 12px;
        }
        html::-webkit-scrollbar-track, body::-webkit-scrollbar-track {
            background: rgba(5, 3, 10, 0.95);
        }
        html::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, #00e5ff, #ff007f);
            border-radius: 10px;
            border: 2px solid #05030a;
        }

        /* 24K HD Premium Hyper-Glow Shifting Blobs */
        .glow-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
            pointer-events: none;
        }
        .blob-pink {
            width: 500px;
            height: 500px;
            background: #ff007f;
            top: -15%;
            left: -15%;
            animation: float-around 18s infinite ease-in-out alternate;
        }
        .blob-blue {
            width: 600px;
            height: 600px;
            background: #00e5ff;
            bottom: -20%;
            right: -15%;
            animation: float-around 24s infinite ease-in-out alternate-reverse;
        }

        @keyframes float-around {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(60px, 80px) scale(1.2); }
            100% { transform: translate(-40px, 40px) scale(0.9); }
        }

        /* Branding Header Section Container - Clean Block Centering */
        .header-section {
            text-align: center;
            margin: 0 auto 15px auto; 
            width: 100%;
            max-width: 1400px;
            position: relative;
            z-index: 2;
        }

        .main-heading {
            font-size: 2.1rem;
            font-weight: 800; 
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00e5ff 0%, #ff007f 50%, #e040fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px; 
            text-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
        }

        .sub-heading {
            font-size: 1.25rem;
            font-weight: 700; 
            letter-spacing: 0.02em;
            color: #e2e8f0;
            margin-bottom: 8px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .context-heading {
            display: inline-block;
            font-size: 1rem;
            font-weight: 700; 
            padding: 6px 18px;
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.2) 0%, rgba(255, 0, 127, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: #ff007f;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 0, 127, 0.2);
        }

        /* Controls Filter Panel Row - Safe Margin Layout */
        .controls-panel {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin: 0 auto 15px auto;
            position: relative;
            z-index: 2;
        }

        .input-control {
            width: 100%;
            padding: 11px 16px;
            background: rgba(6, 4, 12, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700; 
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .input-control:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.3), inset 0 1px 3px rgba(0,0,0,0.5);
        }

        select.input-control option {
            background-color: #06040c;
            color: #ffffff;
            font-weight: 600;
        }

        /* 24K HD 3D Solid Glassmorphic Container Card - Strict Overflow Protection */
        .table-card {
            width: max-content; 
            min-width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(16, 12, 28, 0.75) 0%, rgba(8, 10, 20, 0.8) 100%);
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 16px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255,255,255,0.1); 
            position: relative;
            z-index: 1;
        }

        .table-responsive-wrapper {
            width: 100%;
        }

        /* Strict Structural Auto-Width Table Rules */
        table {
            border-collapse: collapse;
            width: max-content; 
            min-width: 100%;
            table-layout: auto; /* Ensures natural text metrics dictate column sizes */
        }

        th, td {
            padding: 14px 22px;
            text-align: center; 
            white-space: nowrap; 
            font-size: 0.98rem;
            vertical-align: middle;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Solid Table Header Styles */
        th {
            background-color: #051d33; 
            color: #00e5ff;
            font-weight: 800; 
            letter-spacing: 0.02em;
            border-bottom: 3px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Data Rows Layout */
        tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background-color 0.15s ease;
        }

        td {
            font-weight: 600; 
            color: #ffffff;
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        tr:hover td {
            background-color: rgba(255, 0, 127, 0.12);
            color: #ffffff;
        }

        /* View Button with inline scalable SVG PDF icon */
        .view-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 7px 16px;
            background: linear-gradient(135deg, #ff0055 0%, #b3003b 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 800; 
            box-shadow: 0 3px 10px rgba(255, 0, 85, 0.4);
            transition: all 0.2s ease;
        }

        .view-btn:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 18px rgba(255, 0, 85, 0.6);
            background: linear-gradient(135deg, #ff3377 0%, #d60048 100%);
        }

        .pdf-icon {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }

        /* UI Loading Layout */
        .status-container {
            padding: 50px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: #cbd5e1;
        }
        .pulse {
            animation: pulse-animation 2s infinite ease-in-out;
        }
        @keyframes pulse-animation {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glow-blob blob-pink"></div>
    <div class="glow-blob blob-blue"></div>

    <div class="header-section">
        <h1 class="main-heading">Mahatma Gandhi Institute of Technology (A)</h1>
        <h2 class="sub-heading">Training & Placement Cell</h2>
        <div class="context-heading">Mail Confirmation of the Selected Students by the Company</div>
    </div>

    <div class="controls-panel">
        <input type="text" id="global-search" class="input-control" placeholder="Search anything in the table...">
        <select id="company-filter" class="input-control">
            <option value="">All Companies</option>
        </select>
        <select id="role-filter" class="input-control">
            <option value="">All Roles</option>
        </select>
    </div>
    
    <div class="table-card">
        <div id="status-display" class="status-container pulse">Loading live placement confirmation roster...</div>
        <div class="table-responsive-wrapper">
            <table id="sheet-table" style="display: none;">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Your Exact Google Sheet CSV Export Link
        const yourSpreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzi2UfchSGRPmZfSVheSGZBTmRWLeEHDkbhfQhv_fTcRiXPBAopA3QWU55IovkEsxh7E3rl0VjTLlB/pub?gid=157028113&single=true&output=csv';
        
        // --- COLUMN CONFIGURATION ---
        const COMPANY_COLUMN_NAME = "Company Name"; 
        const ROLE_COLUMN_NAME = "Role";
        
        let globalDataGrid = [];
        let companyColIndex = -1;
        let roleColIndex = -1;

        function initSheetDownload() {
            Papa.parse(yourSpreadsheetUrl, {
                download: true,
                skipEmptyLines: true,
                complete: function(results) {
                    globalDataGrid = results.data;
                    detectFilterColumns(globalDataGrid[0]);
                    populateFilterDropdowns(globalDataGrid);
                    renderHtmlTable(globalDataGrid);
                    setupFilterEventListeners();
                },
                error: function(err) {
                    console.error("Data Load Error:", err);
                    const statusBox = document.getElementById('status-display');
                    statusBox.classList.remove('pulse');
                    statusBox.innerHTML = `<span style="color:#ff0055; font-weight:700;">Unable to pull data. Check permissions.</span>`;
                }
            });
        }

        function isValidUrl(string) {
            try {
                const url = new URL(string.trim());
                return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
                return false;  
            }
        }

        function detectFilterColumns(headerRow) {
            headerRow.forEach((header, index) => {
                const cleanHeader = header.trim().toLowerCase();
                if (cleanHeader === COMPANY_COLUMN_NAME.trim().toLowerCase()) {
                    companyColIndex = index;
                }
                if (cleanHeader === ROLE_COLUMN_NAME.trim().toLowerCase()) {
                    roleColIndex = index;
                }
            });
        }

        function populateFilterDropdowns(data) {
            if (data.length <= 1) return;
            
            const companies = new Set();
            const roles = new Set();

            for (let i = 1; i < data.length; i++) {
                if (companyColIndex !== -1 && data[i][companyColIndex]) {
                    const val = data[i][companyColIndex].trim();
                    if(val !== "") companies.add(val);
                }
                if (roleColIndex !== -1 && data[i][roleColIndex]) {
                    const val = data[i][roleColIndex].trim();
                    if(val !== "") roles.add(val);
                }
            }

            const compSelect = document.getElementById('company-filter');
            Array.from(companies).sort().forEach(comp => {
                const opt = document.createElement('option');
                opt.value = comp;
                opt.textContent = comp;
                compSelect.appendChild(opt);
            });

            const roleSelect = document.getElementById('role-filter');
            Array.from(roles).sort().forEach(role => {
                const opt = document.createElement('option');
                opt.value = role;
                opt.textContent = role;
                roleSelect.appendChild(opt);
            });
        }

        function setupFilterEventListeners() {
            document.getElementById('global-search').addEventListener('input', applyCombinedFilters);
            document.getElementById('company-filter').addEventListener('change', applyCombinedFilters);
            document.getElementById('role-filter').addEventListener('change', applyCombinedFilters);
        }

        function applyCombinedFilters() {
            const searchQuery = document.getElementById('global-search').value.toLowerCase().trim();
            const selectedCompany = document.getElementById('company-filter').value;
            const selectedRole = document.getElementById('role-filter').value;

            const filteredRows = [globalDataGrid[0]];

            for (let i = 1; i < globalDataGrid.length; i++) {
                const row = globalDataGrid[i];
                
                const matchesCompany = !selectedCompany || (companyColIndex !== -1 && row[companyColIndex]?.trim() === selectedCompany);
                const matchesRole = !selectedRole || (roleColIndex !== -1 && row[roleColIndex]?.trim() === selectedRole);
                const matchesSearch = !searchQuery || row.some(cell => cell.toLowerCase().includes(searchQuery));

                if (matchesCompany && matchesRole && matchesSearch) {
                    filteredRows.push(row);
                }
            }

            renderHtmlTable(filteredRows, true);
        }

        function renderHtmlTable(data, isFiltering = false) {
            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            
            tableHead.innerHTML = "";
            tableBody.innerHTML = "";

            if (!data || data.length === 0 || (isFiltering && data.length === 1)) {
                document.getElementById('sheet-table').style.display = 'none';
                document.getElementById('status-display').style.display = 'block';
                document.getElementById('status-display').textContent = "No records match your selected search criteria.";
                return;
            }

            // 1. Render Header Row
            const headerTr = document.createElement('tr');
            data[0].forEach(headerText => {
                const th = document.createElement('th');
                th.textContent = headerText;
                headerTr.appendChild(th);
            });
            tableHead.appendChild(headerTr);

            // 2. Render Body Data Rows
            for (let i = 1; i < data.length; i++) {
                const rowData = data[i];
                const tr = document.createElement('tr');
                
                rowData.forEach(cellText => {
                    const td = document.createElement('td');
                    const cleanText = cellText.trim();

                    if (isValidUrl(cleanText)) {
                        const actionButton = document.createElement('a');
                        actionButton.href = cleanText;
                        actionButton.target = "_blank";
                        actionButton.className = "view-btn";
                        
                        actionButton.innerHTML = `
                            <svg class="pdf-icon" viewBox="0 0 384 512">
                                <path d="M181.9 256.1c-5-16-4.9-46.9-2-46.9 8.4 0 7.6 36.9 2 46.9zm-1.7 47.2c-7.7 20.2-17.3 43.3-28.4 62.7 18.3-7 39-17.2 53.7-26.8-11-5.1-19.6-19.2-25.3-35.9zm-124.5 68.2c-16.3 0-21.6 13.1-21.6 23.9 0 20.5 22.8 38.7 54.5 38.7 14.6 0 21.7-6.5 24-12.4-5.3-22.1-41.2-50.2-56.9-50.2zm238.1-259.5H224c-13.3 0-24 10.7-24 24v110.1c11.9-10.7 27.5-21.4 44.8-31.5 21.1-12.3 27-26.2 27-37 0-12.2-11.5-23.6-24-23.6zM384 121.9v342.2c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V48c0-26.5 21.5-48 48-48h147.9c12.7 0 25 5.1 34 14.1l110 110c9 9 14.1 21.3 14.1 33.8zm-113.1 32c0-3.6-2.9-6.5-6.5-6.5H240v29.3c0 3.6 2.9 6.5 6.5 6.5h24.4c3.6 0 6.5-2.9 6.5-6.5v-22.8zM100.8 450c-23.3 0-48.4-12.8-48.4-42.3 0-24 16.2-46.1 48.3-46.1 20 0 46.2 20.3 64.9 39.5 23.2-30.8 44.1-73.6 56.4-114.1-11.8-36.5-16.1-75.3-7.5-90 8.7-14.8 24.1-23 37.9-23 25.5 0 41.2 22.8 41.2 46.1 0 25.5-17.7 54.1-44.5 73-34.2 24.2-76.1 43.1-105.1 54.9-12.9 22-24.1 47.3-33 71.7 34.6 23.9 65 37.3 84 37.3 32.7 0 44.7-22.1 44.7-34.6 0-33.8-51.2-50.5-81.8-14.5-5.9 7-10 17.1-12.4 22.7-5.3 11.2-17.6 12.3-26.4 12.3z"/>
                            </svg> View`;
                        td.appendChild(actionButton);
                    } else {
                        td.textContent = cellText;
                    }
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            }

            document.getElementById('status-display').style.display = 'none';
            document.getElementById('sheet-table').style.display = 'table';
        }

        window.addEventListener('DOMContentLoaded', initSheetDownload);
    </script>

</body>
</html>
