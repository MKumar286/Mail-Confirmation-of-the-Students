<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheet Data Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .table-container {
            width: 100%;
            overflow-x: auto; /* Adds custom scrollbar if data stretches wide */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
            background: white;
        }
        /* Structural layout for auto-adjusting columns */
        table {
            border-collapse: collapse;
            width: max-content; /* Dynamically forces table columns to text width */
            min-width: 100%;    
        }
        th, td {
            border-bottom: 1px solid #e1e4e8;
            padding: 12px 16px;
            text-align: left;
            white-space: nowrap; /* Prevents text from breaking into multiple lines */
        }
        th {
            background-color: #1f2937;
            color: #ffffff;
            font-weight: 600;
        }
        tr:nth-child(even) td {
            background-color: #f8fafc;
        }
        tr:hover td {
            background-color: #f1f5f9;
        }
        .loading-text {
            padding: 20px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <h2>Live Data Viewer</h2>
    
    <div class="table-container">
        <div id="status-message" class="loading-text">Loading live data from Google Sheets...</div>
        <table id="sheet-table" style="display: none;">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // Callback function that Google automatically passes the data to
        function handleGoogleSheetData(jsonResponse) {
            try {
                const tableHead = document.getElementById('table-head');
                const tableBody = document.getElementById('table-body');
                
                // Extract columns and rows from Google's complex JSON payload
                const columns = jsonResponse.table.cols;
                const rows = jsonResponse.table.rows;

                // 1. Render Headers
                const headerTr = document.createElement('tr');
                columns.forEach(col => {
                    const th = document.createElement('th');
                    // Fallback to empty string if a column header lacks a text value
                    th.textContent = col.label ? col.label : "";
                    headerTr.appendChild(th);
                });
                tableHead.appendChild(headerTr);

                // 2. Render Rows
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    row.c.forEach(cell => {
                        const td = document.createElement('td');
                        // Pull the formatted cell text value safely
                        td.textContent = cell && cell.f ? cell.f : (cell && cell.v ? cell.v : "");
                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                });

                // Update Display States
                document.getElementById('status-message').style.display = 'none';
                document.getElementById('sheet-table').style.display = 'table';

            } catch (err) {
                console.error("Parsing Error:", err);
                document.getElementById('status-message').innerHTML = "<span style='color:red;'>Failed to map data layout. Ensure columns match properly.</span>";
            }
        }
    </script>

    <script src="https://docs.google.com/spreadsheets/d/1vQVGHSnygzd6lIkieye30zp-iVX_unEpKnZ_I3m__BhX0NfHicM_WvEJmo25mONaw/gviz/tq?tqx=responseHandler:handleGoogleSheetData&gid=1824938792"></script>

</body>
</html>
